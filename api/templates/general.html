{% extends "base.html" %}
{% block script %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-cookie/1.4.1/jquery.cookie.min.js"></script>
<script>
function toggler(tid, fid, counter) {
  $('.'+fid).toggle();
  total = $('#' + tid + ' >tbody >tr:visible').length;
  $('#'+counter).text(total)
  if ($('#' + tid + ' >tbody >tr').is(":hidden")) {
    $('#' + fid + 'btn').text('Show versioned DOIs');
  } else {
    $('#' + fid + 'btn').text('Filter versioned DOIs');
  }
}

// Cycling filter: rotates a table's rows through "A & B" -> "A only" -> "B only".
// The button label shows the current view. Counts are left untouched.
function cycle_filter(btn, tid, ca, cb, la, lb) {
  var state = (parseInt($(btn).attr('data-state') || '0') + 1) % 3;
  $(btn).attr('data-state', state);
  if (state === 0) {
    $('#' + tid + ' .' + ca).show();
    $('#' + tid + ' .' + cb).show();
    $(btn).text('Showing ' + la + ' & ' + lb);
  } else if (state === 1) {
    $('#' + tid + ' .' + ca).show();
    $('#' + tid + ' .' + cb).hide();
    $(btn).text('Showing ' + la + ' only');
  } else {
    $('#' + tid + ' .' + ca).hide();
    $('#' + tid + ' .' + cb).show();
    $(btn).text('Showing ' + lb + ' only');
  }
}

function nav_post(field, value, source="") {
  url = "/doiui/custom";
  payload = '<input type="text" name="field" value="' + field + '" />' +
            '<input type="text" name="value" value="' + value + '" />'
  if (source) {
    payload = payload +
              '<input type="text" name="jrc_obtained_from" value="' + source + '" />'
  }
  var form = $('<form style="visibility:hidden" action="' + url + '" method="post">' +
             payload + '</form>');
  $('body').append(form);
  form.submit();
}

function nav_post_year(field, value, year="All") {
  url = "/doiui/custom";
  payload = '<input type="text" name="field" value="' + field + '" />' +
            '<input type="text" name="value" value="' + value + '" />'
  if (year != 'All') {
    url = url + "/" + year;
  }
  var form = $('<form style="visibility:hidden" action="' + url + '" method="post">' +
             payload + '</form>');
  $('body').append(form);
  form.submit();
}

async function copyText(textToCopy) {
    navigator.permissions.query({name: "clipboard-write"});
      try {
        await navigator.clipboard.writeText(textToCopy);
    } catch (err) {
        console.error('Failed to copy text: ', err);
    }
}
</script>
{% endblock %}
{% block onload %}
onload="tableInitialize();"
{% endblock %}

{% block content %}
  <h2>{{title|safe}}</h2>
  {{ html|safe }}
{% endblock %}
